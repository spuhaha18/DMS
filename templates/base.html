{% load i18n %}
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}EDMS{% endblock %}</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #f6f7f8; color: #1f2933; }
    header { background: #17202a; color: white; padding: 10px 18px; display: flex; gap: 18px; align-items: center; }
    header a { color: white; text-decoration: none; font-size: 14px; }
    main { padding: 18px; }
    table { width: 100%; border-collapse: collapse; background: white; }
    th, td { border-bottom: 1px solid #d8dee4; padding: 8px 10px; text-align: left; font-size: 14px; }
    th { background: #eef1f4; }
    .status { display: inline-block; padding: 2px 8px; border-radius: 4px; background: #dbeafe; font-size: 12px; }
    .panel { background: white; border: 1px solid #d8dee4; border-radius: 6px; padding: 14px; max-width: 980px; }
    input, select, textarea { max-width: 520px; width: 100%; padding: 7px; }
    button, .button { background: #1f6feb; color: white; border: 0; border-radius: 4px; padding: 8px 12px; text-decoration: none; }
  </style>
</head>
<body>
<header>
  <strong>EDMS</strong>
  <a href="{% url 'documents:register' %}">{% trans "문서 등록" %}</a>
  <a href="{% url 'approvals:task_list' %}">{% trans "결재함" %}</a>
  <a href="{% url 'audit:event_list' %}">{% trans "감사 로그" %}</a>
  <a href="{% url 'admin:index' %}">{% trans "관리자" %}</a>
</header>
<main>
  {% for message in messages %}<p>{{ message }}</p>{% endfor %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
