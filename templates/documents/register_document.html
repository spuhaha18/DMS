{% extends "base.html" %}
{% block title %}Register Document{% endblock %}
{% block content %}
<div class="panel">
  <h2>Register New Document</h2>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {% for field in form %}
    <div style="margin-bottom:10px;">
      <label>{{ field.label }}</label><br>
      {{ field }}
      {% if field.errors %}<p style="color:red;">{{ field.errors }}</p>{% endif %}
    </div>
    {% endfor %}
    <button type="submit">Register</button>
    <a href="{% url 'documents:register' %}" style="margin-left:8px;">Cancel</a>
  </form>
</div>
{% endblock %}
