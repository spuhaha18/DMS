{% load i18n %}
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% trans "EDMS — 로그인" %}</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #f6f7f8; color: #1f2933; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .login-box { background: white; border: 1px solid #d8dee4; border-radius: 8px; padding: 32px; width: 100%; max-width: 360px; }
    h1 { font-size: 20px; margin: 0 0 24px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    input[type=text], input[type=password] { width: 100%; padding: 8px; border: 1px solid #d8dee4; border-radius: 4px; font-size: 14px; box-sizing: border-box; margin-bottom: 16px; }
    button { width: 100%; background: #1f6feb; color: white; border: 0; border-radius: 4px; padding: 10px; font-size: 14px; cursor: pointer; }
    .error { color: #c0392b; font-size: 13px; margin-bottom: 12px; }
  </style>
</head>
<body>
<div class="login-box">
  <h1>{% trans "EDMS 로그인" %}</h1>
  {% if form.errors %}
  <p class="error">{% trans "사용자명 또는 비밀번호가 올바르지 않습니다." %}</p>
  {% endif %}
  <form method="post">
    {% csrf_token %}
    {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
    <label for="id_username">{% trans "사용자명" %}</label>
    <input type="text" id="id_username" name="username" autofocus required>
    <label for="id_password">{% trans "비밀번호" %}</label>
    <input type="password" id="id_password" name="password" required>
    <button type="submit">{% trans "로그인" %}</button>
  </form>
</div>
</body>
</html>
