{% extends "base.html" %}
{% load i18n %}
{% block title %}{% trans "비밀번호 변경" %}{% endblock %}
{% block content %}
<div class="panel">
  <h2>{% trans "비밀번호 변경" %}</h2>
  <form method="post">
    {% csrf_token %}
    {% for field in form %}
    <div style="margin-bottom:10px;">
      <label>{{ field.label }}</label><br>
      {{ field }}
      {% if field.errors %}<p style="color:red;">{{ field.errors }}</p>{% endif %}
    </div>
    {% endfor %}
    <button type="submit">{% trans "변경" %}</button>
  </form>
</div>
{% endblock %}
