{% extends "admin/base.html" %}
{% load i18n %}

{% block extrastyle %}
{{ block.super }}
<style>
  #header {
    background: #17202a;
    color: white;
    font-family: system-ui, sans-serif;
    padding: 10px 18px;
  }
  #header a:link,
  #header a:visited {
    color: white;
  }
  #branding h1,
  #branding h1 a:link,
  #branding h1 a:visited {
    color: white;
    font-family: system-ui, sans-serif;
  }
  #user-tools a {
    color: white;
    text-decoration: none;
    font-size: 14px;
  }
  #edms-nav {
    display: inline-flex;
    gap: 14px;
    align-items: center;
    margin-left: 20px;
    vertical-align: middle;
  }
  #edms-nav a {
    color: white;
    text-decoration: none;
    font-size: 14px;
  }
  #edms-nav a:hover {
    text-decoration: underline;
  }
</style>
{% endblock %}

{% block branding %}
<h1 id="site-name">
  <a href="{% url 'admin:index' %}">{% trans "EDMS 관리자" %}</a>
</h1>
<nav id="edms-nav">
  <a href="{% url 'documents:register' %}">{% trans "문서 등록" %}</a>
  <a href="{% url 'approvals:task_list' %}">{% trans "결재함" %}</a>
  <a href="{% url 'audit:event_list' %}">{% trans "감사 로그" %}</a>
</nav>
{% endblock %}
