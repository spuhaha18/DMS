name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: dms_test
          POSTGRES_USER: dms
          POSTGRES_PASSWORD: dms
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U dms"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://dms:dms@localhost:5432/dms_test
      JWT_SECRET: ci-test-secret-key-at-least-32-chars-long
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_HOURS: 8
      MINIO_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      LDAP_HOST: ldap://localhost
      LDAP_DOMAIN: example.local
      LDAP_BASE_DN: DC=example,DC=local
      SMTP_HOST: localhost
      SMTP_PORT: 587
      SMTP_FROM: dms@example.com

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install LibreOffice
        run: sudo apt-get install -y libreoffice --no-install-recommends

      - name: Run tests (unit + integration, skip e2e)
        run: uv run pytest -x -q -m "not e2e" --tb=short

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
