  # ═══════════════════════════════════════════════
  # 문서
  # ═══════════════════════════════════════════════
  /documents:
    get:
      tags: [Documents]
      summary: 문서 목록 (권한 필터 자동 적용)
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: department
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
            enum: [DRAFT, UNDER_REVIEW, UNDER_APPROVAL, EFFECTIVE, UNDER_REVISION, SUPERSEDED, RETIRED]
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: sort
          in: query
          schema:
            type: string
            default: createdAt,desc
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Page'
                  - type: object
                    properties:
                      content:
                        type: array
                        items:
                          $ref: '#/components/schemas/Document'
    post:
      tags: [Documents]
      summary: 문서 생성 (채번 + 초안 버전 생성)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDocumentRequest'
            example:
              category_code: SOP
              department: QC
              title: 원료 수탁시험 절차
              change_reason: 신규 작성
              confidential: false
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateDocumentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /documents/{docId}:
    get:
      tags: [Documents]
      summary: 문서 상세 조회
      parameters:
        - name: docId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

