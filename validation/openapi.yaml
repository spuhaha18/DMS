      tags: [Documents]
      summary: PDF 스트리밍 (pdf.js 뷰어용, Range 지원)
      parameters:
        - name: docId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: verId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: PDF 스트림
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '202':
