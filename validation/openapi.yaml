      parameters:
        - name: docId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: verId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentVersion'
        '409':
          $ref: '#/components/responses/Conflict'

