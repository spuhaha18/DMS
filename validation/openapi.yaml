          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditCheckpoint'

  /audit-logs/checkpoints/verify:
    post:
      tags: [Audit]
      summary: 해시체인 무결성 검증 (범위 지정)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyHashChainRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyHashChainResponse'

  # ═══════════════════════════════════════════════
  # 검색
  # ═══════════════════════════════════════════════
  /search:
    get:
      tags: [Search]
      summary: 통합 검색 (tsvector + mecab-ko)
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
        - name: category
          in: query
          schema:
            type: string
        - name: department
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Page'
                  - type: object
                    properties:
                      content:
                        type: array
                        items:
                          $ref: '#/components/schemas/SearchResult'

  # ═══════════════════════════════════════════════
  # 알림
  # ═══════════════════════════════════════════════
  /notifications:
    get:
      tags: [Notifications]
      summary: 알림 목록
      parameters:
        - name: is_read
          in: query
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Page'
                  - type: object
                    properties:
                      content:
                        type: array
                        items:
                          $ref: '#/components/schemas/Notification'

  /notifications/{notificationId}/read:
    put:
      tags: [Notifications]
      summary: 알림 읽음 처리
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: 읽음 처리 완료

  /notifications/stream:
    get:
      tags: [Notifications]
      summary: SSE 알림 스트림 (text/event-stream)
      description: |
        Server-Sent Events 연결. 5분 timeout 후 클라이언트가 자동 재연결.
        이벤트 형식: data: {"id":1,"type":"WORKFLOW_ASSIGNED","title":"..."}
      responses:
        '200':
          description: SSE 스트림
          content:
            text/event-stream:
              schema:
                type: string

  # ═══════════════════════════════════════════════
  # 교육
  # ═══════════════════════════════════════════════
  /training:
    get:
      tags: [Training]
      summary: 교육 과제 목록 (내 과제 또는 전체 — 권한에 따라)
      parameters:
        - name: user_id
          in: query
          schema:
            type: integer
            format: int64
          description: Admin/QA만 타인 조회 가능
        - name: completed
          in: query
          schema:
            type: boolean
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TrainingAssignment'

  /training/{assignmentId}/acknowledge:
    post:
      tags: [Training]
      summary: 열람 확인 서명 (ACKNOWLEDGED 의미 서명과 동일 흐름)
      parameters:
        - name: assignmentId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
                  format: password
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignResponse'
