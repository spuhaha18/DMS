          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: verId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentVersion'

  /documents/{docId}/versions/{verId}/files:
    post:
      tags: [Documents]
      summary: 원본 파일 업로드 (DRAFT 상태에서만 허용)
      parameters:
        - name: docId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: verId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: ".docx/.xlsx/.pptx/.pdf (최대 100MB)"
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentFile'
        '415':
          description: 허용되지 않는 파일 형식
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

