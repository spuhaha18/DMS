services:
  postgres:
    image: postgres:16
    container_name: edms-postgres
    environment:
      POSTGRES_DB: edms_dev
      POSTGRES_USER: app_role
      POSTGRES_PASSWORD: app_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_role -d edms_dev"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    container_name: edms-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_root
      MINIO_ROOT_PASSWORD: minio_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  gotenberg:
    image: gotenberg/gotenberg:8.7
    container_name: edms-gotenberg
    command:
      - "gotenberg"
      - "--api-port=3000"
      - "--api-timeout=60s"
      - "--libreoffice-disable-routes=false"
      - "--libreoffice-restart-after=10"
      - "--log-level=info"
    ports:
      - "3000:3000"
    mem_limit: 2g
    security_opt:
      - "no-new-privileges:true"
    read_only: true
    tmpfs:
      - /tmp
      - /home/gotenberg/tmp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

volumes:
  pg_data:
  minio_data:
