spring:
  application:
    name: edms
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 105MB
      file-size-threshold: 10MB
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.envers.audit_table_suffix: _AUD
      hibernate.envers.revision_field_name: REV
      hibernate.envers.revision_type_field_name: REVTYPE
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: 8080
  servlet:
    session:
      cookie:
        name: JSESSIONID
        http-only: true
        secure: false  # dev only; prod overrides via profile
        same-site: strict
      timeout: 15m

logging:
  level:
    root: INFO
    com.lab.edms: DEBUG

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-original: ${MINIO_BUCKET_ORIGINAL:edms-documents-original}       # legacy read-only
  bucket-original-v2: ${MINIO_BUCKET_ORIGINAL_V2:documents-original-v2}   # M7 cutover, GOVERNANCE
  bucket-rendition: ${MINIO_BUCKET_RENDITION:documents-rendition}          # M7 신규, GOVERNANCE
  bucket-anchors: ${MINIO_BUCKET_ANCHORS:edms-audit-anchors}               # M5

gotenberg:
  url: ${GOTENBERG_URL:http://localhost:3000}
  timeout-seconds: 60

retention:
  default-years: 10
