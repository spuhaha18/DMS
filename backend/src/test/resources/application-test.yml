spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

edms:
  audit:
    datasource:
      # In tests, the audit role connects to the same Testcontainers DB.
      # The URL is filled in dynamically by AuditDataSourceConfig from the spring.datasource.url
      # plus username/password override.
      username: audit_role
      password: audit_test_password

# MinIO test defaults — overridden at runtime by @DynamicPropertySource in test classes
# that use MinIO. For tests that don't use MinIO directly, these credentials match
# the shared MinIO Testcontainer started in TestcontainersConfig.
minio:
  access-key: minio_test
  secret-key: minio_test_pass
  bucket-original: test-edms-documents-original
  bucket-rendition: test-edms-documents-rendition
