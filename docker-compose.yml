services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dms
      POSTGRES_PASSWORD: dms
      POSTGRES_DB: dms
    volumes: [pgdata:/var/lib/postgresql/data]
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "dms"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    volumes: [miniodata:/data]
    ports: ["9000:9000", "9001:9001"]

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    env_file: .env
    ports: ["8000:8000"]

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports: ["3000:3000"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000

volumes:
  pgdata: {}
  miniodata: {}
